<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Text-to-Instructor</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>Text-to-Instructor</h1>
    <div class="controls-row">
      <button id="narrate" class="primary">▶ Narrate this page</button>
      <label>Voice
        <select id="voice">
          <option value="af_heart">af_heart</option>
          <option value="af_bella">af_bella</option>
          <option value="am_michael">am_michael</option>
          <option value="bf_emma">bf_emma</option>
          <option value="am_adam">am_adam</option>
        </select>
      </label>
      <label>Speed
        <select id="speed">
          <option value="0.9">0.9×</option>
          <option value="1.0" selected>1.0×</option>
          <option value="1.15">1.15×</option>
          <option value="1.3">1.3×</option>
          <option value="1.5">1.5×</option>
        </select>
      </label>
      <label>Vision
        <select id="vision" title="Engine that reads the diagrams">
          <option value="">(default)</option>
          <option value="claude_code">Claude</option>
          <option value="codex">Codex</option>
          <option value="gemini">Gemini</option>
          <option value="grok">Grok</option>
          <option value="openrouter">OpenRouter</option>
          <option value="ollama">Ollama</option>
          <option value="off">Off (captions)</option>
        </select>
      </label>
      <label>Writer
        <select id="writer" title="Engine that writes the narration">
          <option value="">(default)</option>
          <option value="codex">Codex</option>
          <option value="claude_code">Claude</option>
          <option value="claude">Claude API</option>
          <option value="gemini">Gemini</option>
          <option value="grok">Grok</option>
          <option value="openrouter">OpenRouter</option>
          <option value="ollama">Ollama</option>
        </select>
      </label>
      <label class="toggle">
        <input type="checkbox" id="autoadvance" checked /> Auto-advance
      </label>
    </div>
  </header>

  <div class="layout">
    <main>
      <div id="status" class="status"></div>

      <section id="stage" class="stage hidden">
        <figure id="diagram-wrap">
          <img id="diagram" alt="" />
          <figcaption id="caption"></figcaption>
        </figure>
        <div id="showcard" class="showcard hidden"></div>
        <p id="transcript" class="transcript"></p>
        <p id="pausenote" class="pausenote hidden">⏸ Content review question — answer it in Cisco, then press ▶ Play to continue.</p>
      </section>

      <div id="player" class="player hidden">
        <button id="prev" title="Previous">⏮</button>
        <button id="playpause" class="primary" title="Play/Pause">⏸</button>
        <button id="next" title="Next">⏭</button>
        <span id="seg-counter" class="seg-counter">0 / 0</span>
      </div>
    </main>

    <aside id="chat" class="chat">
      <div class="chat-head">
        <strong>Chat</strong>
        <select id="chat-engine" title="Chat engine">
          <option value="codex">Codex</option>
          <option value="claude_code">Claude</option>
          <option value="gemini">Gemini</option>
          <option value="grok">Grok</option>
          <option value="openrouter">OpenRouter</option>
          <option value="claude">Claude API</option>
          <option value="ollama">Ollama</option>
        </select>
        <label class="toggle" title="Web search (Claude Code / Codex only)">
          <input type="checkbox" id="chat-web" /> 🌐
        </label>
        <button id="chat-clear" title="Clear conversation">✕</button>
      </div>
      <div id="chat-log" class="chat-log"></div>
      <form id="chat-form" class="chat-form">
        <textarea id="chat-input" rows="2" placeholder="Ask about this page… (Enter to send)"></textarea>
        <button type="submit" id="chat-send" class="primary">Send</button>
      </form>
    </aside>
  </div>

  <audio id="audio" preload="auto"></audio>
  <script src="/static/player.js"></script>
  <script src="/static/chat.js"></script>
</body>
</html>
